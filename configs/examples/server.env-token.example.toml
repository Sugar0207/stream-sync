# stream-sync/configs/examples/server.env-token.example.toml
# One-shot auth round trip example using shared_token_env.
# Pair this config with configs/examples/client.accepted.example.toml.

[server]
bind_host = "0.0.0.0"
bind_port = 5000
max_clients = 4

[session]
run_id = "streamsync-dev-session"
app_version = "0.1.0"
protocol_version = 1

[auth]
enabled = true
require_known_clients = true
# The server reads token material from the named environment variable.
# Do not set shared_token and shared_token_env on the same client.
# Future token rotation should use an explicit manual overlap window; the
# current example keeps one active environment variable reference per client.

[auth.clients.player1]
display_name = "Player 1"
shared_token_env = "STREAMSYNC_PLAYER1_TOKEN"

[auth.clients.player2]
display_name = "Player 2"
shared_token_env = "STREAMSYNC_PLAYER2_TOKEN"

[auth.clients.player3]
display_name = "Player 3"
shared_token_env = "STREAMSYNC_PLAYER3_TOKEN"

[auth.clients.player4]
display_name = "Player 4"
shared_token_env = "STREAMSYNC_PLAYER4_TOKEN"

[heartbeat]
timeout_ms = 5000
ack_enabled = true

[timebase]
sync_interval_ms = 1000
max_allowed_offset_ms = 1000
offset_smoothing_factor = 0.2

[buffer]
target_delay_ms = 500
max_buffer_ms = 2000
drop_late_frames = true
drop_very_old_frames = true
missing_frame_strategy = "hold_last"

[metrics]
enable_runtime_metrics = true
stats_window_seconds = 10

[logging]
level = "info"
json_lines = true
output_dir = "logs/server"
