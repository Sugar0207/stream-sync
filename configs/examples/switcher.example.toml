# stream-sync/configs/examples/switcher.example.toml

[switcher]
bind_host = "127.0.0.1"
bind_port = 5100
server_host = "127.0.0.1"
server_port = 5001

[session]
run_id = "streamsync-dev-session"
app_version = "0.1.0"
protocol_version = 1

[display]
mode = "quad"
window_title = "StreamSync Switcher"
width = 1280
height = 720
fullscreen = false
show_labels = true
show_status = true
show_metrics = true
hide_ui_for_output = false

[layout]
quad_gap_px = 8
main_view_index = 0
highlight_active_view = true

[input]
enable_hotkeys = true
hotkey_view_1 = "1"
hotkey_view_2 = "2"
hotkey_view_3 = "3"
hotkey_view_4 = "4"
hotkey_quad_view = "0"

[metrics]
show_rtt = true
show_offset = true
show_effective_delay = true
show_fps = true
show_drop_rate = true
show_buffer_state = true

[obs]
output_mode = "window_capture"
separate_clean_output_window = false

[logging]
level = "info"
json_lines = true
output_dir = "logs/switcher"